<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0f00"/>
      <stop offset="100%" stop-color="#0a0800"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#FF6B35" opacity="0.9"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F59E0B"/>
    </marker>
  </defs>

  <rect width="1400" height="800" fill="url(#bg-grad)"/>

  <!-- Subtle grid -->
  <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f1500" stroke-width="0.8"/>
  </pattern>
  <rect width="1400" height="800" fill="url(#g)"/>

  <!-- Title bar -->
  <text x="700" y="50" font-family="'Courier New', monospace" font-size="22" fill="#FF6B35" text-anchor="middle" font-weight="bold" filter="url(#glow)" letter-spacing="4">AGENT ASSEMBLE</text>
  <text x="700" y="74" font-family="monospace" font-size="11" fill="#6b4020" text-anchor="middle" letter-spacing="2">LangGraph · RAG · Agentic Workflow Platform</text>
  <line x1="400" y1="85" x2="1000" y2="85" stroke="#2a1500" stroke-width="1"/>

  <!-- ── Node 1: User Input ── -->
  <rect x="60" y="160" width="160" height="70" rx="10" fill="#1a0f00" stroke="#FF6B35" stroke-width="2"/>
  <text x="140" y="188" font-family="monospace" font-size="10" fill="#FF6B35" text-anchor="middle" letter-spacing="1">USER INPUT</text>
  <text x="140" y="206" font-family="monospace" font-size="9" fill="#6b4020" text-anchor="middle">"Build a LangGraph</text>
  <text x="140" y="220" font-family="monospace" font-size="9" fill="#6b4020" text-anchor="middle">workflow for billing"</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="195" x2="310" y2="195" stroke="#FF6B35" stroke-width="2" marker-end="url(#arrow-orange)" opacity="0.8"/>

  <!-- ── Node 2: LangGraph Orchestrator ── -->
  <rect x="310" y="140" width="190" height="110" rx="10" fill="#1f1000" stroke="#FF6B35" stroke-width="2.5"/>
  <text x="405" y="168" font-family="monospace" font-size="10" fill="#FF6B35" text-anchor="middle" font-weight="bold" letter-spacing="1">LANGGRAPH</text>
  <text x="405" y="182" font-family="monospace" font-size="10" fill="#FF6B35" text-anchor="middle" font-weight="bold">ORCHESTRATOR</text>
  <rect x="324" y="192" width="152" height="1" fill="#2a1500"/>
  <text x="405" y="208" font-family="monospace" font-size="8" fill="#8b6030" text-anchor="middle">State Machine</text>
  <text x="405" y="222" font-family="monospace" font-size="8" fill="#8b6030" text-anchor="middle">Graph Execution</text>
  <text x="405" y="236" font-family="monospace" font-size="8" fill="#8b6030" text-anchor="middle">Node Routing</text>

  <!-- Arrows from Orchestrator -->
  <line x1="500" y1="175" x2="610" y2="130" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrow-amber)" opacity="0.7"/>
  <line x1="500" y1="195" x2="610" y2="195" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrow-amber)" opacity="0.7"/>
  <line x1="500" y1="215" x2="610" y2="260" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrow-amber)" opacity="0.7"/>
  <line x1="500" y1="235" x2="610" y2="325" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrow-amber)" opacity="0.5"/>

  <!-- ── Agent Nodes ── -->
  <!-- RAG Agent -->
  <rect x="610" y="96" width="160" height="72" rx="8" fill="#1a1200" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="690" y="120" font-family="monospace" font-size="9" fill="#F59E0B" text-anchor="middle" letter-spacing="1">RAG RETRIEVAL</text>
  <text x="690" y="136" font-family="monospace" font-size="8" fill="#6b5010" text-anchor="middle">Vector Search</text>
  <text x="690" y="150" font-family="monospace" font-size="8" fill="#6b5010" text-anchor="middle">pgvector · Embeddings</text>

  <!-- API Tool Agent -->
  <rect x="610" y="164" width="160" height="72" rx="8" fill="#1a1200" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="690" y="188" font-family="monospace" font-size="9" fill="#F59E0B" text-anchor="middle" letter-spacing="1">API TOOL AGENT</text>
  <text x="690" y="204" font-family="monospace" font-size="8" fill="#6b5010" text-anchor="middle">REST Calls</text>
  <text x="690" y="218" font-family="monospace" font-size="8" fill="#6b5010" text-anchor="middle">External Services</text>

  <!-- Scheduler Agent -->
  <rect x="610" y="232" width="160" height="72" rx="8" fill="#1a1200" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="690" y="256" font-family="monospace" font-size="9" fill="#F59E0B" text-anchor="middle" letter-spacing="1">SCHEDULER</text>
  <text x="690" y="272" font-family="monospace" font-size="8" fill="#6b5010" text-anchor="middle">Cron Jobs</text>
  <text x="690" y="286" font-family="monospace" font-size="8" fill="#6b5010" text-anchor="middle">Task Queuing</text>

  <!-- Memory Agent -->
  <rect x="610" y="300" width="160" height="72" rx="8" fill="#1a1200" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="690" y="324" font-family="monospace" font-size="9" fill="#F59E0B" text-anchor="middle" letter-spacing="1">MEMORY AGENT</text>
  <text x="690" y="340" font-family="monospace" font-size="8" fill="#6b5010" text-anchor="middle">Conversation Context</text>
  <text x="690" y="354" font-family="monospace" font-size="8" fill="#6b5010" text-anchor="middle">Long-term Memory</text>

  <!-- Arrows to LLM -->
  <line x1="770" y1="132" x2="880" y2="200" stroke="#FF6B35" stroke-width="1.5" marker-end="url(#arrow-orange)" opacity="0.6"/>
  <line x1="770" y1="200" x2="880" y2="210" stroke="#FF6B35" stroke-width="1.5" marker-end="url(#arrow-orange)" opacity="0.6"/>
  <line x1="770" y1="268" x2="880" y2="220" stroke="#FF6B35" stroke-width="1.5" marker-end="url(#arrow-orange)" opacity="0.6"/>
  <line x1="770" y1="336" x2="880" y2="230" stroke="#FF6B35" stroke-width="1.5" marker-end="url(#arrow-orange)" opacity="0.4"/>

  <!-- ── LLM Reasoning ── -->
  <rect x="880" y="155" width="170" height="110" rx="10" fill="#1f0e00" stroke="#FF6B35" stroke-width="2.5"/>
  <text x="965" y="182" font-family="monospace" font-size="10" fill="#FF6B35" text-anchor="middle" font-weight="bold">LLM REASONING</text>
  <rect x="894" y="190" width="142" height="1" fill="#2a1500"/>
  <text x="965" y="205" font-family="monospace" font-size="8" fill="#8b6030" text-anchor="middle">OpenAI GPT-4o</text>
  <text x="965" y="219" font-family="monospace" font-size="8" fill="#8b6030" text-anchor="middle">Context Assembly</text>
  <text x="965" y="233" font-family="monospace" font-size="8" fill="#8b6030" text-anchor="middle">Response Generation</text>
  <text x="965" y="247" font-family="monospace" font-size="8" fill="#8b6030" text-anchor="middle">Chain-of-Thought</text>

  <!-- Arrow to Output -->
  <line x1="1050" y1="210" x2="1140" y2="210" stroke="#FF6B35" stroke-width="2" marker-end="url(#arrow-orange)" opacity="0.8"/>

  <!-- ── Output ── -->
  <rect x="1140" y="160" width="190" height="100" rx="10" fill="#0a1500" stroke="#86C232" stroke-width="2"/>
  <text x="1235" y="186" font-family="monospace" font-size="10" fill="#86C232" text-anchor="middle" letter-spacing="1">OUTPUT</text>
  <rect x="1150" y="194" width="170" height="1" fill="#1a2a1a"/>
  <text x="1235" y="210" font-family="monospace" font-size="8" fill="#4a6f2a" text-anchor="middle">✓ Workflow Executed</text>
  <text x="1235" y="224" font-family="monospace" font-size="8" fill="#4a6f2a" text-anchor="middle">✓ API Tasks Complete</text>
  <text x="1235" y="238" font-family="monospace" font-size="8" fill="#4a6f2a" text-anchor="middle">✓ Memory Updated</text>

  <!-- ── Bottom: Tech stack pills ── -->
  <text x="700" y="470" font-family="monospace" font-size="11" fill="#3a2010" text-anchor="middle" letter-spacing="3">TECH STACK</text>
  <line x1="500" y1="480" x2="900" y2="480" stroke="#1f1000" stroke-width="1"/>

  <!-- Pills -->
  <rect x="200" y="500" width="110" height="28" rx="14" fill="#1f1000" stroke="#FF6B35" stroke-width="1"/>
  <text x="255" y="519" font-family="monospace" font-size="9" fill="#FF6B35" text-anchor="middle">LangGraph</text>

  <rect x="328" y="500" width="90" height="28" rx="14" fill="#1f1000" stroke="#F59E0B" stroke-width="1"/>
  <text x="373" y="519" font-family="monospace" font-size="9" fill="#F59E0B" text-anchor="middle">Python</text>

  <rect x="436" y="500" width="80" height="28" rx="14" fill="#1f1000" stroke="#FF6B35" stroke-width="1"/>
  <text x="476" y="519" font-family="monospace" font-size="9" fill="#FF6B35" text-anchor="middle">OpenAI</text>

  <rect x="534" y="500" width="100" height="28" rx="14" fill="#1f1000" stroke="#F59E0B" stroke-width="1"/>
  <text x="584" y="519" font-family="monospace" font-size="9" fill="#F59E0B" text-anchor="middle">pgvector</text>

  <rect x="652" y="500" width="80" height="28" rx="14" fill="#1f1000" stroke="#FF6B35" stroke-width="1"/>
  <text x="692" y="519" font-family="monospace" font-size="9" fill="#FF6B35" text-anchor="middle">RAG</text>

  <rect x="750" y="500" width="110" height="28" rx="14" fill="#1f1000" stroke="#F59E0B" stroke-width="1"/>
  <text x="805" y="519" font-family="monospace" font-size="9" fill="#F59E0B" text-anchor="middle">REST APIs</text>

  <rect x="878" y="500" width="130" height="28" rx="14" fill="#1f1000" stroke="#FF6B35" stroke-width="1"/>
  <text x="943" y="519" font-family="monospace" font-size="9" fill="#FF6B35" text-anchor="middle">Salesforce</text>

  <rect x="1026" y="500" width="120" height="28" rx="14" fill="#1f1000" stroke="#F59E0B" stroke-width="1"/>
  <text x="1086" y="519" font-family="monospace" font-size="9" fill="#F59E0B" text-anchor="middle">Deloitte USI</text>

  <!-- Description -->
  <text x="700" y="580" font-family="monospace" font-size="11" fill="#4a2a10" text-anchor="middle">Natural language → autonomous agent execution across API tools, scheduling &amp; multi-step business processes</text>

  <!-- Decorative corners -->
  <path d="M 20 20 L 60 20 L 60 24 L 24 24 L 24 60 L 20 60 Z" fill="#FF6B35" opacity="0.3"/>
  <path d="M 1380 20 L 1340 20 L 1340 24 L 1376 24 L 1376 60 L 1380 60 Z" fill="#FF6B35" opacity="0.3"/>
  <path d="M 20 780 L 60 780 L 60 776 L 24 776 L 24 740 L 20 740 Z" fill="#FF6B35" opacity="0.3"/>
  <path d="M 1380 780 L 1340 780 L 1340 776 L 1376 776 L 1376 740 L 1380 740 Z" fill="#FF6B35" opacity="0.3"/>
</svg>
