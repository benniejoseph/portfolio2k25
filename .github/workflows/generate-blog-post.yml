name: Generate Blog Post

on:
  # Run every Monday at 8am IST (2:30am UTC)
  schedule:
    - cron: '30 2 * * 1'
  # Also allow manual runs from GitHub Actions tab
  workflow_dispatch:
    inputs:
      topic_index:
        description: 'Topic index (leave blank to auto-pick next unpublished)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate post
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.topic_index }}" ]; then
            npx tsx scripts/generate-post.ts --index ${{ github.event.inputs.topic_index }}
          else
            npx tsx scripts/generate-post.ts
          fi

      - name: Commit new post and images
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/ public/images/blog/
          if git diff --staged --quiet; then
            echo "No new post generated (all topics already published)"
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "content: auto-generate blog post with images via OpenAI"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate LinkedIn draft
        if: steps.commit.outputs.committed == 'true'
        run: |
          if [ -f .generated-slug ]; then
            SLUG=$(cat .generated-slug)
            echo "Generating LinkedIn draft for: $SLUG"
            npx tsx scripts/publish-linkedin.ts --slug "$SLUG"
          else
            echo "No .generated-slug file found — skipping LinkedIn draft"
          fi
